<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Save the date</title>

<!-- Social preview — actualizar por evento (puede ser distinto al de la invitación completa) -->
<meta name="description"        content="Reservá la fecha.">
<meta property="og:type"        content="website">
<meta property="og:title"       content="Save the date">
<meta property="og:description" content="Reservá la fecha.">
<meta property="og:image"       content="preview-std.png">

<meta name="theme-color" content="#1a1714">

<link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="favicon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="theme.css?v=1">
<link rel="stylesheet" href="styles.css?v=1">
</head>
<body class="gate-active">

<!-- ══ 1. PORTADA ══════════════════════════════════════════════════════════ -->
<div class="entry-gate" id="entryGate" tabindex="0" role="button" aria-label="Ingresar al save the date">
  <div class="entry-gate-inner">
    <span class="entry-gate-ornament" aria-hidden="true"></span>
    <div class="entry-gate-title" id="gateTitle">Invitación</div>
    <div class="entry-gate-sub">Save the date</div>
    <button class="entry-btn" id="entryBtn">Hacé clic para ingresar</button>
  </div>
</div>

<!-- ══ 2. BOTÓN MÚSICA ════════════════════════════════════════════════════ -->
<button class="music-toggle muted" id="musicToggle" aria-label="Activar música">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M9 18V5l12-2v13"/>
    <circle cx="6" cy="18" r="3"/>
    <circle cx="18" cy="16" r="3"/>
  </svg>
</button>

<main>

  <!-- ══ 3. HERO ══════════════════════════════════════════════════════════ -->
  <!-- Kicker fijo: id distinto para que app.js no lo sobreescriba con el de la invitación completa -->
  <section class="hero" aria-label="Encabezado">
    <span class="hero-kicker fade-up" id="heroKickerStd">Save the date</span>
    <h1 class="hero-name fade-up delay-1" id="heroName">Nombre</h1>
    <div class="hero-date fade-up delay-2" id="heroDate">DD · Mes · AAAA</div>
    <div class="hero-rule fade-up delay-3" aria-hidden="true"></div>

    <!-- Cuenta regresiva -->
    <div class="countdown fade-up delay-4" aria-label="Cuenta regresiva">
      <div class="count-box">
        <span class="count-num" id="days">00</span>
        <span class="count-label">Días</span>
      </div>
      <div class="count-box">
        <span class="count-num" id="hours">00</span>
        <span class="count-label">Horas</span>
      </div>
      <div class="count-box">
        <span class="count-num" id="minutes">00</span>
        <span class="count-label">Min</span>
      </div>
      <div class="count-box">
        <span class="count-num" id="seconds">00</span>
        <span class="count-label">Seg</span>
      </div>
    </div>
    <div class="countdown-msg" id="countdownMsg">¡Hoy es la noche!</div>
  </section>

</main>

<script src="app.js?v=1"></script>
</body>
</html>
