<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de invitaciones</title>
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#1a1714">

<link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="favicon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="theme.css?v=19">
<link rel="stylesheet" href="styles.css?v=19">

<style>
  body.panel-page { background: var(--bg, #faf8f5); color: var(--text, #1a1714); min-height: 100vh; margin: 0; font-family: var(--font-body, system-ui, sans-serif); display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
  .panel { width: 100%; max-width: 28rem; text-align: center; }
  .panel h1 { font-family: var(--font-display, serif); font-weight: 400; font-size: clamp(1.6rem, 5vw, 2.2rem); margin: 0 0 .4rem; color: var(--accent, #b5884a); }
  .panel p.lead { color: var(--text-soft, #5a534e); margin: 0 0 2rem; font-size: .95rem; line-height: 1.5; }
  .panel-grid { display: grid; gap: .75rem; }
  .panel-btn { display: block; width: 100%; padding: 1rem 1.25rem; background: var(--bg-soft, #f3efe9); color: var(--text, #1a1714); border: 1px solid var(--accent, #b5884a); border-radius: 12px; font: inherit; font-size: 1rem; cursor: pointer; transition: background .15s ease, color .15s ease, transform .1s ease; text-align: left; }
  .panel-btn:hover { background: var(--accent-light, #d4ab72); color: var(--bg, #faf8f5); }
  .panel-btn:active { transform: scale(.98); }
  .panel-btn .btn-title { display: block; font-weight: 600; }
  .panel-btn .btn-sub { display: block; font-size: .8rem; color: var(--text-soft, #5a534e); margin-top: .15rem; }
  .panel-btn:hover .btn-sub { color: inherit; opacity: .85; }
  .panel-btn.copied { background: var(--accent, #b5884a); color: var(--bg, #faf8f5); border-color: var(--accent, #b5884a); }
  .panel-btn.copied .btn-sub { color: inherit; opacity: .85; }
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(1rem); background: var(--accent, #b5884a); color: var(--bg, #faf8f5); padding: .6rem 1.1rem; border-radius: 999px; font-size: .9rem; font-weight: 600; opacity: 0; pointer-events: none; transition: opacity .2s ease, transform .2s ease; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body class="panel-page">

<!-- Fondo temático estrellado + partículas doradas -->
<div class="starry-bg" aria-hidden="true"></div>
<div class="gold-particles" aria-hidden="true"></div>


<main class="panel">
  <h1>Compartir invitaciones</h1>
  <p class="lead">Tocá un botón para copiar el mensaje y pegarlo en WhatsApp.</p>

  <div class="panel-grid" id="panelGrid">
    <button class="panel-btn" type="button" data-slug="save-the-date" data-template="¡Reservá la fecha de mis XV! 📅 {url}">
      <span class="btn-title">Save the date</span>
      <span class="btn-sub">Aviso previo, sin detalles</span>
    </button>
    <button class="panel-btn" type="button" data-slug="teen" data-template="¡Te invito a mis XV! 🎉 {url}">
      <span class="btn-title">Teen</span>
      <span class="btn-sub">Invitación para amigos</span>
    </button>
    <button class="panel-btn" type="button" data-slug="adulto" data-template="¡Te invito a mis XV! 💖 {url}">
      <span class="btn-title">Adulto</span>
      <span class="btn-sub">Invitación para mayores</span>
    </button>
    <button class="panel-btn" type="button" data-slug="despues-12" data-template="¡Te invito al baile de mis XV! 🪩 {url}">
      <span class="btn-title">Después de las 12</span>
      <span class="btn-sub">Solo baile, post medianoche</span>
    </button>
  </div>
</main>

<div class="toast" id="toast" role="status" aria-live="polite">¡Copiado!</div>

<script>
(function () {
  const base = location.origin + location.pathname.replace(/\/panel(\.html)?\/?$/, '');
  const toast = document.getElementById('toast');
  let toastTimer;

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1600);
  }

  async function copy(text) {
    try {
      await navigator.clipboard.writeText(text);
      return true;
    } catch (_) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      let ok = false;
      try { ok = document.execCommand('copy'); } catch (_) {}
      document.body.removeChild(ta);
      return ok;
    }
  }

  document.getElementById('panelGrid').addEventListener('click', async (e) => {
    const btn = e.target.closest('.panel-btn');
    if (!btn) return;
    const url = base + '/' + btn.dataset.slug;
    const text = btn.dataset.template.replace('{url}', url);
    const ok = await copy(text);
    if (ok) {
      showToast('¡Copiado!');
      btn.classList.add('copied');
      setTimeout(() => btn.classList.remove('copied'), 1200);
    } else {
      showToast('No se pudo copiar');
    }
  });
})();
</script>
</body>
</html>
